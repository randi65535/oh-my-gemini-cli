name: Version Consistency Check

on:
  push:
    branches: [ main ]
    paths:
      - 'package.json'
      - 'gemini-extension.json'
  pull_request:
    branches: [ main ]
    paths:
      - 'package.json'
      - 'gemini-extension.json'

jobs:
  check-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Run version check script
        run: node scripts/check-version.js
