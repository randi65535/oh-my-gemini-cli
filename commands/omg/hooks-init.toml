description = "Bootstrap OmG hook scaffolding and default event policy files."
prompt = """
Initialize OmG hooks.

Task context:
$ARGUMENTS

Bootstrap protocol:
1. Create a default hook profile (`balanced`) with deterministic event lanes and lifecycle symmetry enabled.
2. Read `.omg/state/session-lock.json` before mutating shared hook scaffolding.
3. If filesystem tools are available:
   - if the current orchestration session owns the lock, create/update `.omg/state/hooks.json`, `.omg/hooks/README.md`, and `.omg/hooks/plugins/*`
   - otherwise write `.omg/state/sessions/[session-slug]/hooks.json` plus session-local hook notes under `.omg/state/sessions/[session-slug]/hooks/` and report the ownership conflict
4. Document plugin contract for runtime adapters:
   - `onHookEvent(event, sdk)`
   - `event` envelope: `event`, `source`, `session_id`, `task_id`, `lane`, `subagent`, `termination_reason`, `metadata`
   - `sdk` capabilities: `log`, `state.get`, `state.set`, optional runtime bridge methods
5. Add default guardrails:
   - side-effect hooks off for worker sessions
   - fail-open for non-critical lanes (`P2-optimization`)
   - fail-closed for explicit safety violations (`P0-safety`)
   - blocked continuations re-enter the safety lane before quality/optimization lanes
   - terminal hook outcomes are recorded once per agent turn
   - persisted hook state should avoid timestamps or other volatile churn unless operator-visible
6. Recommend immediate validation with `/omg:hooks-validate`.

Output format:
## Hook Bootstrap
- status:
- profile:
- files initialized:

## Default Event Matrix
| Event | Lane | Enabled | Side Effects |
| --- | --- | --- | --- |

## Contract Notes
- ...

## Next Command
- /omg:hooks-validate
"""
