description = "Inspect or set OmG model-selection strategy (balanced, auto, custom) for default task routing."
prompt = """
Run OmG model-strategy manager.

Input:
$ARGUMENTS

Protocol:
1. Parse requested strategy and optional lane overrides.
   - examples:
     - `auto`
     - `balanced`
     - `custom planning=pro execution=flash quick=flash-lite review_verify=pro`
2. Supported strategies:
   - `balanced` (default): role-aware lane split (`pro` for planning/review, `flash` for execution, `flash-lite` for quick low-risk edits)
   - `auto`: defer lane model selection to Gemini runtime auto-model policy across all lanes
   - `custom`: operator-provided lane map with Gemini CLI aliases or concrete model names
3. If no strategy is provided, show current policy from `.omg/state/model.json` when available.
4. Produce an effective lane map for:
   - planning
   - execution
   - quick_edit
   - review_verify
5. If filesystem tools are available, write/update `.omg/state/model.json`.
6. Clarify boundary:
   - this command sets OmG orchestration defaults
   - runtime model forcing still depends on Gemini CLI runtime controls (for example `/model` or launch-time `--model` when supported)

Suggested `model.json` shape:
{
  "strategy": "balanced|auto|custom",
  "lane_models": {
    "planning": "pro|auto|<custom>",
    "execution": "flash|auto|<custom>",
    "quick_edit": "flash-lite|auto|<custom>",
    "review_verify": "pro|auto|<custom>"
  },
  "updated_at": "<ISO-8601>",
  "source": "omg:model"
}

Response:
- Keep it concise and operator-facing.
- Include `Model Strategy`, `Effective Allocation`, `Runtime Notes`, and `Next Command`.
"""
