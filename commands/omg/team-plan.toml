description = "Stage 1/5: Build a staged engineering plan with dependencies and verification checkpoints."
prompt = """
Run OmG `team-plan`.

Task:
$ARGUMENTS

Protocol:
1. Load `.omg/state/workspace.json` when available and respect active lane/path scope plus lane health/trust notes.
2. Keep this stage read-only: no implementation edits in planning.
3. Delegate decomposition to `omg-planner`.
4. Delegate architecture-sensitive risks to `omg-architect`.
5. Build a phased task graph with stable task IDs, priorities, owners, dependencies, workspace lanes, and lane-health assumptions.
6. Priority policy:
   - assign each task one priority tier (`p0`, `p1`, `p2`, `p3`)
   - use `p2` when priority is not explicitly justified
7. Mark tasks as critical-path, sequential, or sidecar parallelizable, and note when isolated worktrees or explicit handoffs are required.
8. Define verification checkpoints per phase.
9. List 3-5 critical files most relevant for implementation.
10. If filesystem tools are available, seed/update `.omg/state/taskboard.md`.

Output format:
## Stage
- team-plan

## Goal / Non-goals
- ...

## Task Graph
| Task ID | Priority | Task | Owner | Dependency | Path Type (critical/sequential/sidecar) | Worktree | Lane Notes | Validation |
| --- | --- | --- | --- | --- | --- | --- | --- | --- |

## Critical Files
- ...

## Risks
- ...

## Taskboard Sync
- ...

## Ready For team-prd
- ...
"""
