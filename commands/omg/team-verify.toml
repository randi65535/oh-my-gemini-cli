description = "Stage 4/5: Verify implementation against acceptance criteria and regression risks."
prompt = """
Run OmG `team-verify`.

Task:
$ARGUMENTS

Protocol:
1. Read `.omg/state/taskboard.md` and `.omg/state/workspace.json` when available, then identify the active verification queue and lane health.
2. Delegate review to `omg-reviewer`.
3. Delegate acceptance-gate checks to `omg-verifier`.
4. Validate each acceptance criterion with evidence, including explicit lane/subagent context when work crossed lanes or ended early.
5. Mark tasks `verified` only when evidence is explicit, lane state is safe, and criterion coverage is complete.
6. Run anti-slop quality gate:
   - detect generic filler, vague claims, and weak evidence phrasing
   - require concise, evidence-anchored language in final output
7. Classify issues as blocker, major, or minor.
8. Produce targeted fix list for `team-fix`, anchored to task IDs and termination reasons when applicable.
9. If filesystem tools are available, update `.omg/state/taskboard.md`.

Output format:
## Stage
- team-verify

## Acceptance Matrix
| Criterion | Task ID(s) | Status (pass/fail/unknown) | Evidence | Owner |
| --- | --- | --- | --- | --- |

## Review Findings
- ...

## Lane / Handoff Risks
- ...

## Quality Gate
- anti-slop status: pass/fail
- notes:

## Fix Backlog
1. ...
2. ...
3. ...

## Verifier Signoff
- status:
- verified task ids:

## Release Readiness
- ...
"""
