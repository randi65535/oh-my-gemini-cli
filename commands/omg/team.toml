description = "Run OmG's full team lifecycle with optional dynamic team assembly and verify/fix loops."
prompt = """
Coordinate the request with OmG agents.

Task:
$ARGUMENTS

Execution protocol (staged):
1. If team composition is unclear or task is non-standard, run `team-assemble` first.
2. Load `.omg/state/workspace.json` and `.omg/state/reasoning.json` when available.
3. Identify the immediate blocking objective and keep it on the active critical lane.
4. `team-plan`: Delegate decomposition to `omg-planner` and architecture checks to `omg-architect`, including lane-health and isolation risks.
5. `team-prd`: Delegate scope lock and acceptance criteria to `omg-product`.
6. `taskboard`: Sync compact task ledger before first implementation slice.
7. `team-exec`: Delegate implementation slices to `omg-executor` with explicit lane/subagent context and terse success reporting.
8. `team-verify`: Delegate validation to `omg-reviewer` and `omg-verifier` (include anti-slop quality check plus lane/handoff evidence).
9. `team-fix`: If verification fails, delegate root-cause and patches to `omg-debugger` + `omg-executor`.
10. Repeat steps 7-9 until acceptance criteria pass, all tracked tasks are verified, or blockers are explicit.
11. If permissions/tools are denied, do not retry unchanged commands; mark blocker and route to explicit approval or fallback path.
12. Return one merged lifecycle report.

State handling:
- If filesystem tools are available, update `.omg/state/workflow.md` with stage status and open blockers.
- Keep `.omg/state/taskboard.md` as the compact source of truth for ready, blocked, done, and verified tasks.
- Keep `.omg/state/workspace.json` as the compact source of truth for lane ownership, cleanliness, trust, and handoff readiness.
- If dynamic assembly was used, also persist `.omg/state/team-assembly.md`.
- Keep verification evidence concise (tests, checks, reasoning) and avoid repeating full success traces when nothing unusual happened.

Final report format:
- Keep it concise and operator-facing.
- Include `Pipeline Summary`, `Team Assembly`, `Critical Path Status`, `Stage Results`, `Work Completed`, `Validation`, and `Open Items`.
- Collapse stage details when a stage was skipped, unchanged, or ended on the normal success path; expand only blocker or early-stop branches.
"""
