description = "Run OmG's full team lifecycle with optional dynamic team assembly and verify/fix loops."
prompt = """
Coordinate the request with OmG agents.

Task:
$ARGUMENTS

Execution protocol (staged):
1. If team composition is unclear or task is non-standard, run `team-assemble` first.
2. Load `.omg/state/workspace.json` and `.omg/state/reasoning.json` when available.
3. `team-plan`: Delegate decomposition to `omg-planner` and architecture checks to `omg-architect`.
4. `team-prd`: Delegate scope lock and acceptance criteria to `omg-product`.
5. `taskboard`: Sync compact task ledger before first implementation slice.
6. `team-exec`: Delegate implementation slices to `omg-executor`.
7. `team-verify`: Delegate validation to `omg-reviewer` and `omg-verifier` (include anti-slop quality check).
8. `team-fix`: If verification fails, delegate root-cause and patches to `omg-debugger` + `omg-executor`.
9. Repeat steps 6-8 until acceptance criteria pass, all tracked tasks are verified, or blockers are explicit.
10. Return one merged lifecycle report.

State handling:
- If filesystem tools are available, update `.omg/state/workflow.md` with stage status and open blockers.
- Keep `.omg/state/taskboard.md` as the compact source of truth for ready, blocked, done, and verified tasks.
- If dynamic assembly was used, also persist `.omg/state/team-assembly.md`.
- Keep verification evidence concise (tests, checks, reasoning).

Final report format:
- Keep it concise and operator-facing.
- Include `Pipeline Summary`, `Team Assembly`, `Stage Results`, `Work Completed`, `Validation`, and `Open Items`.
- Collapse stage details when a stage was skipped or unchanged.
"""
