description = "Initialize a persistent OmG workflow lifecycle and start staged execution."
prompt = """
Launch OmG workflow lifecycle.

Task:
$ARGUMENTS

Launch protocol:
1. Initialize lifecycle metadata (mode, objective, acceptance criteria, owner assumptions).
2. If filesystem tools are available, create/update:
   - `.omg/state/workflow.md`
   - `.omg/state/checkpoint.md`
   - `.omg/state/taskboard.md` (only when a task graph already exists)
   - `.omg/state/workspace.json` (only when user provided path/lane scope)
   - `.omg/state/hud.json` (create default `visibility=normal` only if missing)
3. Run `team-plan` then `team-prd`.
4. For non-trivial implementation work, treat `/omg:workspace set ...` or existing workspace state plus `/omg:workspace audit` as the default preflight before execution.
5. Recommend `/omg:taskboard sync` after audit whenever the task spans multiple roots, parallel lanes, or any resume/handoff boundary.
6. Start first execution slice (`team-exec`) only when scope is clear and the active lane is clean/trusted enough for execution or review, with no unresolved baseline drift.
7. Report current stage, any preflight blocker, and resume command.

Output format:
## Lifecycle
- status: launched
- active mode:
- current stage:

## Initialized State
- ...

## First Execution Slice
- ...

## Resume
- next command:
"""
