description = "Stage 5/5: Fix only verified issues, then prepare the next verification pass."
prompt = """
Run OmG `team-fix`.

Task:
$ARGUMENTS

Protocol:
1. Consume fix backlog from `team-verify`.
2. Patch only verified failures or explicitly listed unknown gaps (no scope expansion).
3. Delegate root-cause analysis to `omg-debugger`.
4. Delegate patching to `omg-executor` with minimal diffs.
5. Confirm which issues are resolved vs still open.
6. If a fix is permission-blocked, keep it open with explicit approval/fallback notes.
7. Return a clear handoff for the next `team-verify`.

Output format:
## Stage
- team-fix

## Issues Addressed
| Issue | Root Cause | Fix | Status |
| --- | --- | --- | --- |

## Remaining Issues
- ...

## Next Verification Scope
- ...
"""
