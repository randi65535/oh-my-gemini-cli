description = "Run a task intent gate to classify the request and route to the right OmG stage/command."
prompt = """
Run OmG `intent` gate.

Input:
$ARGUMENTS

Protocol:
1. Classify the primary intent into one:
   - team-assemble
   - plan
   - prd
   - exec
   - verify
   - fix
   - research
   - lifecycle
2. Identify missing constraints or acceptance criteria needed before execution.
3. Detect when workspace/worktree setup or workspace audit is needed before execution or parallel delegation.
4. Detect command-intent mismatch (for example, implementation request but planning stage is missing).
5. Recommend the next OmG command and agent handoff.
6. If filesystem tools are available, write/update `.omg/state/intent.md`.

Routing hints:
- multi-root, dirty-lane, or worktree-sensitive implementation -> `/omg:workspace` (use `/omg:workspace audit` when lane health or trust is unclear)
- dynamic multi-role team setup -> `/omg:team-assemble`
- planning ambiguity -> `/omg:team-plan`
- scope ambiguity -> `/omg:team-prd`
- implementation-ready -> `/omg:team-exec`
- validation request -> `/omg:team-verify`
- defect-only fix -> `/omg:team-fix`
- task drift or completion-proof drift -> `/omg:taskboard`
- option research -> `$research`
- mode/lifecycle operations -> `/omg:mode`, `/omg:launch`, `/omg:checkpoint`, `/omg:stop`

Response:
- Keep it concise and operator-facing.
- Include `Intent Gate`, `Missing Inputs`, `Recommended Route`, and `Ready-to-Run Prompt`.
"""
