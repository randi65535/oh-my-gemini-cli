description = "Stage 3/5: Implement approved plan slices with controlled scope and validation notes."
prompt = """
Run OmG `team-exec`.

Task:
$ARGUMENTS

Protocol:
1. Confirm current accepted scope from `team-prd`.
2. Read `.omg/state/taskboard.md` and `.omg/state/workspace.json` when available, then confirm the active lane owner plus cleanliness/trust notes.
3. Pull only the smallest ready task slice with a stable task ID.
4. Delegate implementation to `omg-executor` with explicit lane/subagent context.
5. Keep each execution slice small and reviewable; keep the success path terse unless the slice stops early or blocks.
6. Record changed files, workspace lane, rationale, and any early-stop or blocked termination reason.
7. Include checks/tests performed for this slice.
8. If lane health is unsafe for review or automation, call it out and recommend `/omg:workspace audit` or isolated worktree use.
9. If filesystem tools are available, update `.omg/state/taskboard.md`.

Output format:
## Stage
- team-exec

## Scope Slice
- task id:
- ...

## Execution Outcome
- termination: goal | blocked | stopped-early
- lane:
- subagent:

## Implementation Log
| Change | File(s) | Lane | Reason |
| --- | --- | --- | --- |

## Validation Signals
- ...

## Taskboard Update
- ...

## Handoff Notes
- ...

## Ready For team-verify
- ...
"""
